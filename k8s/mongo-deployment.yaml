apiVersion: apps/v1
kind: Deployment
metadata:
  name: mongodb
  namespace: fluid-ai

spec:
  replicas: 1

  selector:
    matchLabels:
      app: mongodb

  template:
    metadata:
      labels:
        app: mongodb

    spec:
      containers:
      - name: mongodb
        image: mongo:7

        ports:
        - containerPort: 27017

        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "250m"
            memory: "256Mi"
