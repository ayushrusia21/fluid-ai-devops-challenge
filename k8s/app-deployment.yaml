apiVersion: apps/v1
kind: Deployment
metadata:
  name: fluid-ai-app
  namespace: fluid-ai

spec:
  replicas: 2

  selector:
    matchLabels:
      app: fluid-ai-app

  template:
    metadata:
      labels:
        app: fluid-ai-app

    spec:
      containers:
      - name: fluid-ai-app
        image: ayushrusia21/fluid-ai-app:v1
        imagePullPolicy: IfNotPresent

        env:
        - name: MONGO_HOST
          valueFrom:
            secretKeyRef:
              name: mongo-secret
              key: MONGO_HOST

        ports:
        - containerPort: 5000

        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "250m"
            memory: "256Mi"

        readinessProbe:
          httpGet:
            path: /health
            port: 5000
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 2
          failureThreshold: 3

        livenessProbe:
          httpGet:
            path: /health
            port: 5000
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 2
          failureThreshold: 3
