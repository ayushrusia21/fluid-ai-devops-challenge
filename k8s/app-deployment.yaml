apiVersion: apps/v1
kind: Deployment
metadata:
  name: fluid-ai-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: fluid-ai-app
  template:
    metadata:
      labels:
        app: fluid-ai-app
    spec:
      containers:
      - name: fluid-ai-app
        image: fluid-ai-app:latest
        imagePullPolicy: IfNotPresent

        env:
        - name: MONGO_HOST
          value: mongodb

        ports:
        - containerPort: 5000

        readinessProbe:
          httpGet:
            path: /health
            port: 5000
          initialDelaySeconds: 5
          periodSeconds: 5

        livenessProbe:
          httpGet:
            path: /health
            port: 5000
          initialDelaySeconds: 10
          periodSeconds: 10
